---
name: Portability

on:
  schedule:
    - cron: '31 5 * * *'
  workflow_dispatch:

concurrency:
  group: portability-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NetBSD
            action: netbsd
          - name: OpenBSD
            action: openbsd
          - name: Solaris
            action: solaris
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: NetBSD build
        if: matrix.action == 'netbsd'
        uses: vmactions/netbsd-vm@fac0a63f3e5244c600cb9ca532d27ee774ecdb4b # v1.4.3
        with:
          usesh: true
          prepare: /usr/sbin/pkg_add -u cmake ninja-build pcre2 icu openssl ncurses
          run: |
            cmake -S . -B build -G Ninja -DBUILD_TESTING=ON
            cmake --build build
            ctest --test-dir build --output-on-failure
      - name: OpenBSD build
        if: matrix.action == 'openbsd'
        uses: vmactions/openbsd-vm@18edb32f4e48dae5865d7b8b3a9587bc01218a20 # v1.4.4
        with:
          usesh: true
          prepare: |
            pkg_add -I -D installed cmake ninja pcre2 icu4c
            pkg_add -I -u cmake ninja pcre2 icu4c
          run: |
            cmake -S . -B build -G Ninja -DBUILD_TESTING=ON \
              -DTF_TLS=OFF
            cmake --build build
            ctest --test-dir build --output-on-failure
      - name: Solaris build
        if: matrix.action == 'solaris'
        uses: vmactions/solaris-vm@d30dd6c228c8661ade859e36ead7660b9a62efcc # v1.3.7
        with:
          release: 11.4-gcc
          usesh: true
          prepare: pkg install cmake ninja pcre2 developer/icu openssl ncurses
          run: |
            cmake -S . -B build -G Ninja -DBUILD_TESTING=ON
            cmake --build build
            ctest --test-dir build --output-on-failure
