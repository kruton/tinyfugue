---
name: Continuous Integration

on:
  push:
  pull_request:
  schedule:
    - cron: '31 5 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: Linux (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gcc-full
            cc: gcc
            args: >-
              -DTF_WIDECHAR=ON -DTF_TLS=ON -DTF_TERMCAP=ON -DTF_ZLIB=ON
          - name: clang-auto
            cc: clang
            args: -DCMAKE_C_FLAGS=-Wall\ -Wextra
          - name: gnutls
            cc: gcc
            gnutls: true
            args: >-
              -DTF_TLS=ON
              -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE
          - name: auto-fallback
            cc: gcc
            args: >-
              -DCMAKE_DISABLE_FIND_PACKAGE_ICU=TRUE
              -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE
              -DCMAKE_DISABLE_FIND_PACKAGE_GnuTLS=TRUE
              -DCMAKE_DISABLE_FIND_PACKAGE_ZLIB=TRUE
          - name: minimal
            cc: gcc
            args: >-
              -DTF_WIDECHAR=OFF -DTF_TLS=OFF -DTF_TERMCAP=OFF
              -DTF_ZLIB=OFF -DTF_INET6=OFF -DTF_GETADDRINFO=OFF
              -DTF_HISTORY=OFF -DTF_PROCESS=OFF -DTF_FLOAT=OFF
          - name: protocols
            cc: gcc
            args: -DTF_ATCP=ON -DTF_GMCP=ON -DTF_OPTION102=ON
          - name: versioned-install
            cc: gcc
            args: -DTF_VERSIONED=ON -DTF_INSTALL_SYMLINK=ON
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -q -y \
            cmake ninja-build libssl-dev libncurses-dev \
            libicu-dev libpcre2-dev zlib1g-dev
      - name: Install Clang
        if: matrix.cc == 'clang'
        run: sudo apt-get install -q -y clang
      - name: Install GnuTLS
        if: matrix.gnutls
        run: sudo apt-get install -q -y libgnutls28-dev
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
        run: cmake -S . -B build -G Ninja -DBUILD_TESTING=ON ${{ matrix.args }}
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: brew install cmake ninja icu4c pcre2 openssl@3
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DBUILD_TESTING=ON \
            -DTF_WIDECHAR=ON -DTF_TLS=ON -DTF_TERMCAP=ON -DTF_ZLIB=ON \
            -DCMAKE_PREFIX_PATH="$(brew --prefix icu4c);$(brew --prefix openssl@3)"
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  wasm:
    name: WebAssembly
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -q -y cmake git ninja-build nodejs
      - name: Install Emscripten
        run: |
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          /tmp/emsdk/emsdk install latest
          /tmp/emsdk/emsdk activate latest
      - name: Build PCRE2 for WebAssembly
        run: |
          . /tmp/emsdk/emsdk_env.sh
          git clone --depth 1 https://github.com/PCRE2Project/pcre2.git /tmp/pcre2
          emcmake cmake -S /tmp/pcre2 -B /tmp/pcre2-build -G Ninja \
            -DCMAKE_INSTALL_PREFIX=/tmp/pcre2-wasm \
            -DPCRE2_BUILD_PCRE2_8=ON \
            -DPCRE2_BUILD_PCRE2_16=OFF \
            -DPCRE2_BUILD_PCRE2_32=OFF \
            -DPCRE2_BUILD_TESTS=OFF \
            -DPCRE2_BUILD_PCRE2GREP=OFF \
            -DPCRE2_BUILD_PCRE2TEST=OFF \
            -DPCRE2_SUPPORT_JIT=OFF \
            -DPCRE2_SUPPORT_UNICODE=OFF
          cmake --build /tmp/pcre2-build
          cmake --install /tmp/pcre2-build
      - name: Configure
        run: |
          . /tmp/emsdk/emsdk_env.sh
          emcmake cmake -S . -B build-wasm -G Ninja -DBUILD_TESTING=ON \
            -DTF_WASM=ON \
            -DCMAKE_PREFIX_PATH=/tmp/pcre2-wasm
      - name: Build
        run: |
          . /tmp/emsdk/emsdk_env.sh
          cmake --build build-wasm
          cmake --build build-wasm --target wasm-dist
      - name: Test
        run: |
          . /tmp/emsdk/emsdk_env.sh
          ctest --test-dir build-wasm --output-on-failure

  freebsd:
    name: FreeBSD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build and test in FreeBSD
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636 # v1.4.8
        with:
          usesh: true
          prepare: pkg install -y cmake ninja pcre2 icu openssl ncurses
          run: |
            cmake -S . -B build -G Ninja -DBUILD_TESTING=ON
            cmake --build build
            ctest --test-dir build --output-on-failure

  cygwin:
    name: Cygwin
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@3f0a3f9f988f7e96b8c18098ae05eaec175f5b52 # v6.1
        with:
          packages: >-
            cmake gcc-core libpcre2-devel libicu-devel libssl-devel
            zlib-devel libncurses-devel ninja
      - name: Configure, build, and test
        shell: C:\cygwin\bin\bash.exe --login -o igncr '{0}'
        run: |
          cd "$(cygpath "$GITHUB_WORKSPACE")"
          cmake -S . -B build -G Ninja -DBUILD_TESTING=ON
          cmake --build build
          ctest --test-dir build --output-on-failure
